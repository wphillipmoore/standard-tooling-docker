name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ---------------------------------------------------------------------------
  # Quality: Hadolint, ShellCheck, Markdownlint
  # ---------------------------------------------------------------------------

  hadolint:
    name: "ci: hadolint"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download Hadolint
        run: |
          curl -sL "https://github.com/hadolint/hadolint/releases/download/v2.14.0/hadolint-Linux-x86_64" \
            -o /usr/local/bin/hadolint
          chmod +x /usr/local/bin/hadolint

      - name: Run Hadolint
        run: hadolint docker/*/Dockerfile

  shellcheck:
    name: "ci: shellcheck"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run ShellCheck
        run: shellcheck docker/build.sh

  markdownlint:
    name: "ci: markdownlint"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli@0.47.0

      - name: Run Markdownlint
        run: markdownlint '**/*.md'

  # ---------------------------------------------------------------------------
  # Security and standards (shared reusable workflow)
  # ---------------------------------------------------------------------------

  security-and-standards:
    uses: wphillipmoore/standard-actions/.github/workflows/ci-security.yml@v1.1
    with:
      language: shell
      run-standards: 'true'
      run-security: 'true'
    permissions:
      contents: read
      security-events: write
